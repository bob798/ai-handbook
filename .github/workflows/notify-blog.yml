name: Notify Blog to Rebuild

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '.claude/**'
      - '.omc/**'
      - '.venv/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger blog rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.BLOG_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/bob798/bob798-blog/dispatches \
            -d '{"event_type":"handbook-updated"}'
